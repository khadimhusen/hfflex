{% load crispy_forms_tags %}

<br>
<div class="container" style="background-color: #ddffdd " hx-target="#menu3">
    <div>
    {% for message in messages %}
    <div class="alert alert-warning alert-dismissible fade show py-1" role="alert">
        <strong>{{message}}</strong>
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>
    {% endfor %}
    </div>
    <h2>Person </h2>
    <form>
        {% csrf_token %}
        <div class="form-row">
            <div class="form-group col-md-6 mb-0">{{ personform.person|as_crispy_field }}</div>
            <div class="form-group col-md-6 mb-0">
                <button type="submit" class="btn btn-primary"
                        hx-post="{% url 'production:addpersonhtmx' instance.id %}">Add New Person
                </button>

            </div>
        </div>
    </form>
    <table class="table table-sm table-striped table-bordered">
        <thead>
        <tr>
            <th>Worker Name</th>
        </tr>
        </thead>
        <tbody>
        {% for person in persons %}
        <tr>
            <td>{{person.person}}</td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
