{% extends "home.html" %}

{% block content %}
<div class="container-fluid mt-3">
    <h4>Upload Document</h4>
    <form method="post" enctype="multipart/form-data" class="mt-3" style="max-width: 600px;">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Title</label>
            {{ form.title }}
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            {{ form.description }}
        </div>
        <div class="mb-3">
            <label class="form-label">File</label>
            {{ form.file }}
        </div>
        <div class="mb-3">
            <label class="form-label">Viewers</label>
            <div class="border rounded p-2" style="max-height: 220px; overflow-y: auto;">
                {{ form.viewers }}
            </div>
            <small class="text-muted">Only selected users (plus you) will be able to view or download this file.</small>
        </div>

        <button type="submit" class="btn btn-primary">Upload</button>
        <a href="{% url 'documents:list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}

{% block javascripts %}
<script>
    $(function () {
        $('#id_title, #id_description').addClass('form-control');
        $('#id_file').addClass('form-control');
    });
</script>
{% endblock %}
