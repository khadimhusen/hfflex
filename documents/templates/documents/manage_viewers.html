{% extends "home.html" %}

{% block content %}
<div class="container-fluid mt-3">
    <h4>Manage Viewers — {{ document.title }}</h4>
    <form method="post" class="mt-3" style="max-width: 500px;">
        {% csrf_token %}
        <div class="border rounded p-2 mb-3" style="max-height: 300px; overflow-y: auto;">
            {{ form.viewers }}
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'documents:detail' document.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
